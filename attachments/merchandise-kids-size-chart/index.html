<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="https://i0.wp.com/yrf.com.au/wp-content/uploads/2023/02/YRF_Favicon.png?fit=100%2C100&amp;ssl=1" sizes="192x192">
  <link rel="apple-touch-icon" href="https://i0.wp.com/yrf.com.au/wp-content/uploads/2023/02/YRF_Favicon.png?fit=100%2C100&amp;ssl=1">
  <title>Kids Merchandise Size Chart | Yeppoon Running Festival</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #070b61;
      --navy-900: #040739;
      --red: #c52f35;
      --white: #ffffff;
      --sky: #e9f5ff;
      --ink: #10152f;
      --muted: #66708b;
      --line: rgba(16, 21, 47, 0.12);
      --shadow: 0 22px 55px rgba(7, 11, 97, 0.18);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: var(--sky); }
    a { color: inherit; text-decoration: none; }
    .top-strip { background: var(--red); color: var(--white); font-weight: 800; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .wrap { width: min(1140px, calc(100% - 40px)); margin: 0 auto; }
    .top-strip .wrap { display: flex; justify-content: space-between; align-items: center; min-height: 38px; gap: 18px; }
    header { background: var(--white); border-bottom: 1px solid var(--line); }
    .nav { display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 18px 0; }
    .brand { display: inline-flex; padding: 13px 18px; border-radius: var(--radius); background: var(--red); box-shadow: 0 14px 28px rgba(197, 47, 53, 0.18); }
    .brand img { width: 184px; max-width: 48vw; height: auto; display: block; }
    .button { display: inline-flex; align-items: center; justify-content: center; border: 0; border-radius: var(--radius); padding: 14px 20px; background: var(--red); color: var(--white); font-weight: 800; box-shadow: 0 18px 38px rgba(197, 47, 53, 0.22); }
    .button--light { background: var(--white); color: var(--navy); box-shadow: none; }
    main { padding: 68px 0 82px; }
    .hero { display: grid; grid-template-columns: 0.8fr 1.2fr; gap: 28px; align-items: end; margin-bottom: 28px; }
    .eyebrow { display: flex; align-items: center; gap: 12px; color: var(--red); font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; }
    .eyebrow::before { width: 46px; height: 4px; background: var(--red); content: ""; }
    h1 { margin: 14px 0 0; color: var(--navy-900); font-family: "Barlow Condensed", Impact, sans-serif; font-size: clamp(4rem, 12vw, 8.8rem); line-height: 0.86; letter-spacing: 0; text-transform: uppercase; }
    .intro { max-width: 620px; color: var(--muted); font-size: 1.06rem; font-weight: 700; line-height: 1.65; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }

    .attachment-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: -4px 0 22px;
    }

    .attachment-actions .button {
      min-height: 52px;
    }
    .viewer { overflow: hidden; border-radius: var(--radius); background: var(--white); box-shadow: var(--shadow); }
    .viewer__bar { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 16px 18px; border-bottom: 1px solid var(--line); color: var(--muted); font-size: 0.84rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
    .viewer__content { background: #f8fbff; }
    .viewer iframe { display: block; width: 100%; height: min(78vh, 920px); border: 0; background: var(--white); }
    .viewer img { display: block; width: 100%; height: auto; background: var(--white); }
    footer { background: var(--navy-900); color: rgba(255, 255, 255, 0.7); padding: 22px 0; font-weight: 700; }
    footer .wrap { display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    footer a { color: var(--white); }
    @media (max-width: 780px) {
      .top-strip .wrap, .nav, .hero { align-items: flex-start; flex-direction: column; display: flex; }
      main { padding-top: 46px; }

      h1 {
        font-size: clamp(3.25rem, 18vw, 5.8rem);
      }

      .attachment-actions {
        position: sticky;
        top: 0;
        z-index: 10;
        margin: 0 0 16px;
        padding: 10px 0;
        background: var(--sky);
      }

      .attachment-actions .button {
        width: 100%;
      }

      .viewer__bar {
        align-items: flex-start;
        flex-direction: column;
        padding: 13px 14px;
        font-size: 0.72rem;
      }

      .viewer iframe {
        height: 58vh;
      }

      .viewer img {
        width: 100%;
      }
      .viewer iframe { height: 58vh; }
    }
  </style>
</head>
<body>
  <div class="top-strip"><div class="wrap"><span>Yeppoon, Queensland</span><span>25 &amp; 26 July 2026</span></div></div>
  <header><div class="wrap nav"><a class="brand" href="../../"><img src="https://i0.wp.com/yrf.com.au/wp-content/uploads/2025/09/YRF_SSP_Logo-copy-1.png?w=1500&ssl=1" alt="Yeppoon Running Festival"></a><a class="button" href="../../merchandise/">Back to page</a></div></header>
  <main class="wrap">
    <section class="hero">
      <div>
        <div class="eyebrow">Merchandise</div>
        <h1>Kids Size Chart</h1>
      </div>
      <div>
      </div>
    </section>
    <div class="attachment-actions">
      <a class="button" href="https://yrf.com.au/wp-content/uploads/2025/10/264_KidsSizingChart-1.png" target="_blank" rel="noopener">Open / download file</a>
    </div>
    <section class="viewer" aria-label="Kids Merchandise Size Chart">
      <div class="viewer__bar"><span>Kids Merchandise Size Chart</span><span>YRF attachment viewer</span></div>
      <div class="viewer__content">
        <img src="https://yrf.com.au/wp-content/uploads/2025/10/264_KidsSizingChart-1.png" alt="Kids Merchandise Size Chart">
      </div>
    </section>
  </main>
  <footer><div class="wrap"><span>&copy; 2026 Yeppoon Running Festival</span><a href="../../">Back to homepage</a></div></footer>
</body>
</html>
